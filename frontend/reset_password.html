<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Reset Password — Personal-Drive</title>
  <link rel="stylesheet" href="css/style.css"/>
</head>
<body>
  <div class="bg-canvas"><div class="bg-orb"></div><div class="bg-orb"></div><div class="bg-orb"></div></div>

  <nav class="topbar-global">
    <a href="/" class="nav-logo">
      <div class="nav-logo-icon">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M3 15a4 4 0 0 0 4 4h9a5 5 0 1 0-.23-9.99A5 5 0 0 0 3 15z"/></svg>
      </div>
      Personal-Drive
    </a>
    <div class="nav-right">
      <button class="theme-toggle"></button>
      <a href="login.html" class="btn-nav">Sign in</a>
    </div>
  </nav>

  <div class="auth-page page">
    <div class="glass auth-card">
      <a href="/" class="auth-logo">
        <div class="auth-logo-icon">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M3 15a4 4 0 0 0 4 4h9a5 5 0 1 0-.23-9.99A5 5 0 0 0 3 15z"/></svg>
        </div>
        <span>Personal-Drive</span>
      </a>

      <div id="step1">
        <h1 class="auth-heading">Reset password</h1>
        <p class="auth-sub">Enter your email to receive a verification code</p>
        <div id="alert1" class="alert" style="margin-bottom:1rem;"></div>
        <div class="form-stack">
          <div class="form-group"><label>Email address</label><input type="email" id="email" placeholder="your@email.com"/></div>
          <button class="btn btn-primary" id="sendBtn">
            <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
            Send Code
          </button>
        </div>
      </div>

      <div id="step2" style="display:none;">
        <h1 class="auth-heading">Enter code</h1>
        <p class="auth-sub">Check your inbox for the 6-digit verification code</p>
        <div id="alert2" class="alert" style="margin-bottom:1rem;"></div>
        <div class="form-stack">
          <div class="form-group">
            <label>Verification code</label>
            <input type="text" id="code" placeholder="000000" maxlength="6" style="text-align:center;letter-spacing:0.35em;font-size:1.35rem;font-weight:800;"/>
          </div>
          <div class="form-group"><label>New password</label><input type="password" id="newPass" placeholder="Enter new password"/></div>
          <div class="form-group"><label>Confirm new password</label><input type="password" id="newPass2" placeholder="Repeat new password"/></div>
          <button class="btn btn-primary" id="resetBtn">Reset Password</button>
          <button class="btn btn-ghost" id="backBtn" style="width:100%;">← Back</button>
        </div>
      </div>

      <div class="auth-footer"><a href="login.html">← Back to sign in</a></div>
    </div>
  </div>

  <script src="js/api.js"></script>
  <script>
    let emailVal="";
    document.getElementById("sendBtn").addEventListener("click",async()=>{
      const email=document.getElementById("email").value.trim();
      const a=document.getElementById("alert1");
      if(!email){showAlert(a,"Please enter your email.");return;}
      const btn=document.getElementById("sendBtn");btn.textContent="Sending...";btn.disabled=true;hideAlert(a);
      const res=await fetch(`${API}/api/user/password/reset-request?email=${encodeURIComponent(email)}`,{method:"POST"});
      const d=await res.json();
      if(res.ok){emailVal=email;document.getElementById("step1").style.display="none";document.getElementById("step2").style.display="block";}
      else{showAlert(a,d.detail||"Email not found.");btn.textContent="Send Code";btn.disabled=false;}
    });
    document.getElementById("resetBtn").addEventListener("click",async()=>{
      const code=document.getElementById("code").value.trim();
      const newPass=document.getElementById("newPass").value;
      const newPass2=document.getElementById("newPass2").value;
      const a=document.getElementById("alert2");
      if(!code||!newPass||!newPass2){showAlert(a,"Please fill in all fields.");return;}
      if(newPass!==newPass2){showAlert(a,"Passwords do not match.");return;}
      const btn=document.getElementById("resetBtn");btn.textContent="Resetting...";btn.disabled=true;hideAlert(a);
      const params=new URLSearchParams({email:emailVal,code,new_password:newPass});
      const res=await fetch(`${API}/api/user/password/reset?${params}`,{method:"POST"});
      const d=await res.json();
      if(res.ok){showAlert(a,"Password reset! Redirecting...","success");setTimeout(()=>window.location.href="login.html",1500);}
      else{showAlert(a,d.detail||"Invalid or expired code.");btn.textContent="Reset Password";btn.disabled=false;}
    });
    document.getElementById("backBtn").addEventListener("click",()=>{
      document.getElementById("step2").style.display="none";
      document.getElementById("step1").style.display="block";
    });
  </script>
</body>
</html>
