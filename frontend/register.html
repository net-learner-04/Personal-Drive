<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Create Account — Personal-Drive</title>
  <link rel="stylesheet" href="css/style.css"/>
</head>
<body>
  <div class="bg-canvas"><div class="bg-orb"></div><div class="bg-orb"></div><div class="bg-orb"></div></div>

  <nav class="topbar-global">
    <a href="/" class="nav-logo">
      <div class="nav-logo-icon">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M3 15a4 4 0 0 0 4 4h9a5 5 0 1 0-.23-9.99A5 5 0 0 0 3 15z"/></svg>
      </div>
      Personal-Drive
    </a>
    <div class="nav-right">
      <button class="theme-toggle"></button>
      <a href="login.html" class="btn-nav">Sign in</a>
    </div>
  </nav>

  <div class="auth-page page">
    <div class="glass auth-card">
      <a href="/" class="auth-logo">
        <div class="auth-logo-icon">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M3 15a4 4 0 0 0 4 4h9a5 5 0 1 0-.23-9.99A5 5 0 0 0 3 15z"/></svg>
        </div>
        <span>Personal-Drive</span>
      </a>

      <div class="step-indicator" style="display:flex;gap:0.4rem;margin-bottom:1.75rem;">
        <div class="step-dot active" id="dot1" style="height:3px;flex:1;border-radius:99px;background:var(--accent);transition:all 0.3s;"></div>
        <div class="step-dot" id="dot2" style="height:3px;flex:1;border-radius:99px;background:var(--glass-b);transition:all 0.3s;"></div>
        <div class="step-dot" id="dot3" style="height:3px;flex:1;border-radius:99px;background:var(--glass-b);transition:all 0.3s;"></div>
      </div>

      <div id="step1">
        <h1 class="auth-heading">Create account</h1>
        <p class="auth-sub">Step 1 of 3 — Enter your details</p>
        <div id="alert1" class="alert" style="margin-bottom:1rem;"></div>
        <div class="form-stack">
          <div class="form-group"><label>Username</label><input type="text" id="username" placeholder="Choose a username" autocomplete="username"/></div>
          <div class="form-group"><label>Email</label><input type="email" id="email" placeholder="your@email.com" autocomplete="email"/></div>
          <div class="form-group"><label>Password</label><input type="password" id="passwd1" placeholder="Create a strong password" autocomplete="new-password"/></div>
          <div class="form-group"><label>Confirm password</label><input type="password" id="passwd2" placeholder="Repeat your password" autocomplete="new-password"/></div>
          <button class="btn btn-primary" id="nextBtn">
            Continue
            <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/></svg>
          </button>
        </div>
      </div>

      <div id="step2" style="display:none;">
        <h1 class="auth-heading">Verify email</h1>
        <p class="auth-sub" id="step2Sub">Step 2 of 3 — Enter the code sent to your email</p>
        <div id="alert2" class="alert" style="margin-bottom:1rem;"></div>
        <div class="form-stack">
          <div class="form-group">
            <label>Verification code</label>
            <input type="text" id="verifyCode" placeholder="000000" maxlength="6" style="text-align:center;letter-spacing:0.35em;font-size:1.35rem;font-weight:800;"/>
          </div>
          <button class="btn btn-primary" id="verifyBtn">
            <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>
            Verify & Create Account
          </button>
          <button class="btn btn-ghost" id="resendBtn" style="width:100%;">Resend code</button>
          <button class="btn btn-ghost" id="backBtn" style="width:100%;">← Back</button>
        </div>
      </div>

      <div id="step3" style="display:none;text-align:center;padding:1rem 0;">
        <div style="width:64px;height:64px;background:linear-gradient(135deg,rgba(99,102,241,0.18),rgba(139,92,246,0.18));border-radius:50%;display:flex;align-items:center;justify-content:center;margin:0 auto 1.25rem;font-size:1.75rem;">✓</div>
        <h1 class="auth-heading">You're in!</h1>
        <p class="auth-sub">Account created successfully. Redirecting to sign in...</p>
      </div>

      <div class="auth-footer">Already have an account? <a href="login.html">Sign in</a></div>
    </div>
  </div>

  <script src="js/api.js"></script>
  <script>
    let formData = {};

    function setStep(n) {
      [1,2,3].forEach(i => {
        document.getElementById(`step${i}`).style.display = i === n ? "block" : "none";
        const dot = document.getElementById(`dot${i}`);
        dot.style.background = i <= n ? "var(--accent)" : "var(--glass-b)";
      });
      if (n === 3) document.getElementById("step3").style.display = "block";
    }

    document.getElementById("nextBtn").addEventListener("click", async () => {
      const name = document.getElementById("username").value.trim();
      const email = document.getElementById("email").value.trim();
      const passwd1 = document.getElementById("passwd1").value;
      const passwd2 = document.getElementById("passwd2").value;
      const a = document.getElementById("alert1");

      if (!name||!email||!passwd1||!passwd2) { showAlert(a, "Please fill in all fields."); return; }
      if (passwd1 !== passwd2) { showAlert(a, "Passwords do not match."); return; }
      if (passwd1.length < 6) { showAlert(a, "Password must be at least 6 characters."); return; }

      const btn = document.getElementById("nextBtn");
      btn.textContent = "Sending code..."; btn.disabled = true; hideAlert(a);

      const res = await fetch(`${API}/api/user/email/verify-request`, {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({email})
      });
      const d = await res.json();

      if (res.ok) {
        formData = {name, email, passwd1, passwd2};
        document.getElementById("step2Sub").textContent = `Step 2 of 3 — Code sent to ${email}`;
        setStep(2);
      } else {
        showAlert(a, d.detail || "Failed to send verification code.");
        btn.innerHTML = `Continue <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/></svg>`;
        btn.disabled = false;
      }
    });

    document.getElementById("verifyBtn").addEventListener("click", async () => {
      const code = document.getElementById("verifyCode").value.trim();
      const a = document.getElementById("alert2");
      if (!code) { showAlert(a, "Please enter the verification code."); return; }

      const btn = document.getElementById("verifyBtn");
      btn.textContent = "Verifying..."; btn.disabled = true; hideAlert(a);

      const verifyRes = await fetch(`${API}/api/user/email/verify-confirm`, {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({email: formData.email, code})
      });

      if (!verifyRes.ok) {
        const d = await verifyRes.json();
        showAlert(a, d.detail || "Invalid or expired code.");
        btn.innerHTML = `<svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg> Verify & Create Account`;
        btn.disabled = false;
        return;
      }

      const createRes = await fetch(`${API}/api/user/create`, {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify(formData)
      });

      if (createRes.status === 204) {
        setStep(3);
        setTimeout(() => window.location.href = "login.html", 2000);
      } else {
        const d = await createRes.json();
        showAlert(a, d.detail || "Registration failed.");
        btn.innerHTML = `<svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg> Verify & Create Account`;
        btn.disabled = false;
      }
    });

    document.getElementById("resendBtn").addEventListener("click", async () => {
      const a = document.getElementById("alert2");
      const btn = document.getElementById("resendBtn");
      btn.textContent = "Sending..."; btn.disabled = true;
      const res = await fetch(`${API}/api/user/email/verify-request`, {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({email: formData.email})
      });
      if (res.ok) { showAlert(a, "Code resent! Check your inbox.", "success"); }
      else { showAlert(a, "Failed to resend code."); }
      btn.textContent = "Resend code"; btn.disabled = false;
    });

    document.getElementById("backBtn").addEventListener("click", () => {
      setStep(1);
      document.getElementById("nextBtn").innerHTML = `Continue <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/></svg>`;
      document.getElementById("nextBtn").disabled = false;
    });
  </script>
</body>
</html>
