<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Sign In — Personal-Drive</title>
  <link rel="stylesheet" href="css/style.css"/>
</head>
<body>
  <div class="bg-canvas"><div class="bg-orb"></div><div class="bg-orb"></div><div class="bg-orb"></div></div>

  <nav class="topbar-global">
    <a href="/" class="nav-logo">
      <div class="nav-logo-icon">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M3 15a4 4 0 0 0 4 4h9a5 5 0 1 0-.23-9.99A5 5 0 0 0 3 15z"/></svg>
      </div>
      Personal-Drive
    </a>
    <div class="nav-right">
      <button class="theme-toggle"></button>
      <a href="register.html" class="btn-nav-ghost">Create account</a>
    </div>
  </nav>

  <div class="auth-page page">
    <div class="glass auth-card">
      <a href="/" class="auth-logo">
        <div class="auth-logo-icon">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M3 15a4 4 0 0 0 4 4h9a5 5 0 1 0-.23-9.99A5 5 0 0 0 3 15z"/></svg>
        </div>
        <span>Personal-Drive</span>
      </a>
      <h1 class="auth-heading">Welcome back</h1>
      <p class="auth-sub">Sign in to access your private cloud</p>
      <div id="alert" class="alert" style="margin-bottom:1rem;"></div>
      <div class="form-stack">
        <div class="form-group">
          <label>Username</label>
          <input type="text" id="username" placeholder="Enter your username" autocomplete="username"/>
        </div>
        <div class="form-group">
          <label>Password</label>
          <input type="password" id="password" placeholder="Enter your password" autocomplete="current-password"/>
        </div>
        <div style="text-align:right;margin-top:-0.4rem;">
          <a href="reset-password.html" style="font-size:0.8rem;color:var(--text3);">Forgot password?</a>
        </div>
        <button class="btn btn-primary" id="loginBtn">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M15 3h4a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2h-4"/><polyline points="10 17 15 12 10 7"/><line x1="15" y1="12" x2="3" y2="12"/></svg>
          Sign In
        </button>
      </div>
      <div class="auth-footer">Don't have an account? <a href="register.html">Create one</a></div>
    </div>
  </div>

  <script src="js/api.js"></script>
  <script>
    if (auth.getToken()) window.location.href = "dashboard.html";
    const alertEl = document.getElementById("alert");
    const loginBtn = document.getElementById("loginBtn");
    const SPIN = `<svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" style="animation:spin 0.8s linear infinite"><polyline points="23 4 23 10 17 10"/><path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/></svg> Signing in...`;
    const DEFAULT = `<svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M15 3h4a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2h-4"/><polyline points="10 17 15 12 10 7"/><line x1="15" y1="12" x2="3" y2="12"/></svg> Sign In`;

    async function login() {
      const username = document.getElementById("username").value.trim();
      const password = document.getElementById("password").value;
      if (!username || !password) { showAlert(alertEl, "Please fill in all fields."); return; }
      loginBtn.disabled = true; loginBtn.innerHTML = SPIN; hideAlert(alertEl);
      const res = await fetch(`${API}/api/user/login`, { method: "POST", headers: {"Content-Type":"application/x-www-form-urlencoded"}, body: new URLSearchParams({username, password}) });
      const data = await res.json();
      if (res.ok) { auth.setToken(data.access_token); auth.setUser({name: username}); window.location.href = "dashboard.html"; }
      else { showAlert(alertEl, data.detail || "Incorrect username or password."); loginBtn.disabled = false; loginBtn.innerHTML = DEFAULT; }
    }
    loginBtn.addEventListener("click", login);
    document.addEventListener("keydown", e => { if (e.key === "Enter") login(); });
  </script>
  <style>@keyframes spin{to{transform:rotate(360deg)}}</style>
</body>
</html>
